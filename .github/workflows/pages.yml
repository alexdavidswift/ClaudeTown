name: Deploy ClaudeTown viewer to GitHub Pages

# Publishes the static viewer in web/ to GitHub Pages on every push to main.
# The viewer is fully static (HTML/CSS/JS + a generated world.js), so there is
# no build step -- we simply upload web/ as the Pages artifact and deploy it.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on via the API on the first run, so no
        # manual Settings change is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
